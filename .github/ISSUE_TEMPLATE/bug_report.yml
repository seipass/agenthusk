name: Bug report
description: Report a reproducible AgentHusk defect using synthetic data only.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include real secrets, report files, or sensitive paths. Use GitHub private vulnerability reporting for security issues.
  - type: input
    id: version
    attributes:
      label: AgentHusk version or commit
      placeholder: 0.1.0 or commit SHA
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: OS and Node.js version
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Synthetic reproduction
      description: Use synthetic placeholders only.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed real secrets, report files, and sensitive paths from this issue.
          required: true
